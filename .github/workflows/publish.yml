name: Publish (Docker + npm + ClawHub)

# Triggers on a pushed tag matching v* (e.g. v0.2.0). The CI workflow
# already builds + smoke-tests every artifact on every PR + main push,
# so by the time a tag exists the build is known good. This workflow's
# job is just to push the published bits to:
#
#   - Docker Hub  (zistica/korveo image)
#   - npm         (@korveo/{openclaw, mastra, voltagent,
#                  openclaw-diagnostics})
#   - ClawHub     (korveo-diagnostics — OpenClaw plugin marketplace)
#
# Why tag-triggered (not main-push)?
#   Every merge would ship a new :latest, which surprises users who
#   `docker pull zistica/korveo` expecting yesterday's behavior. Tags
#   are an explicit "ship this" signal — same pattern as Sentry,
#   Grafana, and the OTel collector.
#
# Required secrets:
#   DOCKERHUB_USERNAME / DOCKERHUB_TOKEN — Docker Hub publish
#   NPM_TOKEN                            — npm publish (auto-token, public scope)
#   CLAWHUB_TOKEN                        — ClawHub publish (registry-issued)

on:
  push:
    tags:
      - 'v*'
  # Lets a maintainer kick off a release manually for the current
  # main HEAD without cutting a tag — useful for hotfix-style pushes.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (without v prefix). Defaults to "latest" only.'
        required: false
        default: ''

permissions:
  contents: read

# Cancel an in-flight publish if a newer tag/dispatch arrives. Two
# parallel publishes pushing :latest would race — last writer wins —
# and the result is non-deterministic.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build + push zistica/korveo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU lets us cross-build for arm64 from an amd64 runner. ~70%
      # of OSS Docker users on macOS are on Apple Silicon now; shipping
      # an amd64-only image makes them eat a slow emulation layer at
      # `docker run` time. Multi-arch is one extra job-minute but a
      # much better first-run experience.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tags
        id: tags
        run: |
          set -e
          # Strip the v from a git tag (v0.2.0 -> 0.2.0). For a
          # workflow_dispatch run, prefer the user-supplied tag input
          # (no v stripping needed); empty input means "publish :latest
          # only" — useful for re-publishing main without a version bump.
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAGS="zistica/korveo:${VERSION},zistica/korveo:latest"
          else
            DISPATCH_TAG="${{ github.event.inputs.tag }}"
            if [ -n "${DISPATCH_TAG}" ]; then
              VERSION="${DISPATCH_TAG#v}"
              TAGS="zistica/korveo:${VERSION},zistica/korveo:latest"
            else
              VERSION="(latest only)"
              TAGS="zistica/korveo:latest"
            fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}"       >> "$GITHUB_OUTPUT"
          echo "Will publish: ${TAGS}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          # Multi-arch via the buildx builder set up above. arm64 builds
          # are slower (emulated) but worth it for Apple-Silicon devs.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Reuse the GHA cache the CI Docker job populated on the merge
          # commit — most layers should hit cache and the publish takes
          # ~3-5 min instead of a full from-scratch rebuild.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Useful labels for image consumers + Docker Hub UI.
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tags.outputs.version }}
            org.opencontainers.image.title=Korveo
            org.opencontainers.image.description=Local-first AI agent observability — single Docker container

      - name: Summary
        run: |
          echo "### :rocket: Published \`zistica/korveo\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags: \`${{ steps.tags.outputs.tags }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Version: \`${{ steps.tags.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Platforms: \`linux/amd64\`, \`linux/arm64\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull with: \`docker pull zistica/korveo:${{ steps.tags.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"


  # ----- npm publish -----------------------------------------------------
  #
  # Publishes all five `@korveo/*` packages to npmjs.com — the four
  # framework integrations plus the TypeScript SDK (`@korveo/sdk`),
  # which lives at packages/sdk-typescript (a different path than the
  # integrations), so the matrix carries an explicit `dir` per entry.
  # Each package is built fresh on the runner so the published `dist/`
  # matches the tagged source — no relying on stale local build state.
  # Skips workflow_dispatch (manual) runs since lockstep version bumps
  # only land via tags; a hotfix re-publish via dispatch would push the
  # same version twice and npm would reject it.
  npm:
    name: Publish ${{ matrix.pkg }} to npm
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: publish  # docker first; if image fails, npm shouldn't ship either
    permissions:
      contents: read
      id-token: write  # OIDC for npm provenance attestation
    strategy:
      # One package per job, fail-fast=false so a single bad package
      # doesn't poison the rest. npm publish is idempotent within a
      # version (republishing fails cleanly) so a partial-success run
      # can be retried tag-locally.
      fail-fast: false
      matrix:
        include:
          - { pkg: "@korveo/openclaw",             dir: packages/integrations/openclaw }
          - { pkg: "@korveo/openclaw-diagnostics", dir: packages/integrations/openclaw-diagnostics }
          - { pkg: "@korveo/mastra",               dir: packages/integrations/mastra }
          - { pkg: "@korveo/voltagent",            dir: packages/integrations/voltagent }
          - { pkg: "@korveo/sdk",                  dir: packages/sdk-typescript }
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install + build
        run: |
          npm ci
          npm run build

      - name: Verify package version matches tag
        # Hard guard: if the package.json version doesn't match the git
        # tag we're publishing under, fail loudly instead of pushing a
        # mismatched version to npm. The lockstep release process bumps
        # all packages together, so any drift here is a bug.
        run: |
          set -e
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match git tag ($TAG_VERSION)"
            echo "Did you forget to bump ${{ matrix.dir }}/package.json?"
            exit 1
          fi
          echo "version OK: $PKG_VERSION"

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Summary
        run: |
          echo "### :package: Published \`${{ matrix.pkg }}@${GITHUB_REF_NAME#v}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install with: \`npm install ${{ matrix.pkg }}@${GITHUB_REF_NAME#v}\`" >> "$GITHUB_STEP_SUMMARY"


  # ----- ClawHub publish -------------------------------------------------
  #
  # Publishes the OpenClaw plugin (`korveo-diagnostics`) to ClawHub —
  # OpenClaw's plugin marketplace at clawhub.ai. Runs after npm because
  # ClawHub typically resolves npm to fetch the plugin payload, and a
  # ClawHub publish can race with the npm one if both run in parallel.
  #
  # Only the openclaw-diagnostics package is a ClawHub plugin (it ships
  # the `openclaw.plugin.json` manifest); the others are SDKs / exporters
  # for non-OpenClaw frameworks and don't belong on ClawHub.
  clawhub:
    name: Publish korveo-diagnostics to ClawHub
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clawhub CLI
        run: npm i -g clawhub

      - name: Verify plugin version matches tag
        run: |
          set -e
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./packages/integrations/openclaw-diagnostics/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::openclaw-diagnostics version mismatch (tag=$TAG_VERSION, package=$PKG_VERSION)"
            exit 1
          fi
          echo "ClawHub publish target: @korveo/openclaw-diagnostics@v$PKG_VERSION (owner: korveo)"

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        # The current clawhub CLI REQUIRES pinned source provenance:
        # `--source-repo` AND `--source-commit` must both be set, or it
        # errors out before upload. (The older form without them — and
        # the owner/repo@ref fallback — no longer work; verified by a
        # manual publish 2026-05-17.) Package identity comes from
        # package.json (`@korveo/openclaw-diagnostics`); do NOT pass
        # `--name` (overriding it triggers a ClawPack name mismatch).
        run: |
          set -e
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "::error::CLAWHUB_TOKEN secret is not set on this repo"
            exit 1
          fi
          PKG_DIR="packages/integrations/openclaw-diagnostics"
          clawhub package publish "$PKG_DIR" \
            --version "${GITHUB_REF_NAME#v}" \
            --source-repo "${GITHUB_REPOSITORY}" \
            --source-commit "${GITHUB_SHA}" \
            --changelog "Release ${GITHUB_REF_NAME}"

      - name: Summary
        run: |
          echo "### :hammer_and_wrench: Published \`@korveo/openclaw-diagnostics\` to ClawHub" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install with: \`openclaw plugins install clawhub:@korveo/openclaw-diagnostics@${GITHUB_REF_NAME#v}\`" >> "$GITHUB_STEP_SUMMARY"
