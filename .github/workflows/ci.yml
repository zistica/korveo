name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs of the same workflow on the same branch — saves
# CI minutes when pushing rapid-fire commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-sdk:
    name: Python SDK (sessions 1, 5, 6)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-python
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/sdk-python/pyproject.toml
      - name: Install (with langchain + anthropic + llama_index extras for integration tests)
        run: |
          pip install -e ".[test,langchain,anthropic,llama_index]"
      - name: Run tests
        run: pytest -v

  python-api:
    name: FastAPI (session 2)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/api/requirements.txt
      - name: Install local Python SDK first
        # The API imports `korveo` from packages/sdk-python, NOT from PyPI
        # (where an unrelated package shares the name). Install it editable
        # before requirements.txt — order matters or the API fails at
        # import time.
        run: pip install -e ../sdk-python
      - name: Install API requirements
        run: |
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Run tests
        run: pytest -v

      - name: Verify OpenAPI export is up to date (Slice 7A)
        # Catches the most common drift: someone adds an endpoint
        # or changes a model and forgets to regenerate the spec.
        # Failing here at PR review time is cheaper than discovering
        # mismatch in a downstream client generator at integration.
        run: python scripts/export_openapi.py --check --out openapi.json

  typescript-sdk:
    name: TypeScript SDK (session 7)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-typescript
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/sdk-typescript/package-lock.json
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  mastra-integration:
    name: Mastra integration (@korveo/mastra)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/integrations/mastra
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/integrations/mastra/package-lock.json
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  openclaw-integration:
    name: OpenClaw integration (@korveo/openclaw)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/integrations/openclaw
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/integrations/openclaw/package-lock.json
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  voltagent-integration:
    name: VoltAgent integration (@korveo/voltagent)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/integrations/voltagent
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/integrations/voltagent/package-lock.json
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  dashboard:
    name: Next.js dashboard (session 3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/dashboard/package-lock.json
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  docker:
    name: Docker image (session 4)
    runs-on: ubuntu-latest
    needs: [python-sdk, python-api, typescript-sdk, dashboard]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: korveo/korveo:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test the container
        run: |
          # Defensive shell: each step uses `if … then … fi` instead of
          # `&& break` chains, which interact unpredictably with `bash -e`
          # and can abort the whole script after a single curl failure
          # when the service is still warming up. Earlier runs flaked
          # exiting at 1.2s — well before the 30-attempt loop should
          # have finished waiting.
          set +e

          # CI runner is trusted + ephemeral; Docker NAT makes runner
          # traffic look non-loopback inside the container, which the
          # safe-by-default guard 403s without this. (Production on
          # 0.0.0.0 uses KORVEO_API_TOKEN instead — see docker-compose.)
          docker run -d --name korveo-ci -e KORVEO_ALLOW_INSECURE=1 -p 3000:3000 -p 8000:8000 korveo/korveo:ci
          if [ $? -ne 0 ]; then
            echo "::error::docker run failed"
            exit 1
          fi

          # Wait for the API to come up (up to 60s — Next.js standalone
          # adds ~5s of warmup on the runner)
          api_ready=0
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/health >/dev/null 2>&1; then
              api_ready=1
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done
          if [ "$api_ready" -ne 1 ]; then
            echo "::error::API did not become ready within 60s"
            docker logs korveo-ci || true
            exit 1
          fi

          # Wait for the dashboard too (it boots after the API)
          dash_ready=0
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://127.0.0.1:3000/agents 2>/dev/null; then
              dash_ready=1
              echo "Dashboard ready after ${i}s"
              break
            fi
            sleep 1
          done
          if [ "$dash_ready" -ne 1 ]; then
            echo "::error::Dashboard did not become ready within 30s"
            docker logs korveo-ci || true
            exit 1
          fi

          # Now run the actual assertions. Re-enable errexit so any
          # failure here is a real one.
          set -e

          # Both ports respond
          curl -fs http://127.0.0.1:8000/health   | grep -q '"status":"ok"'
          curl -fs http://127.0.0.1:3000/api/health | grep -q '"status":"ok"'

          # Dashboard renders — sanity-check both the new default route
          # (/agents) and the still-valid /traces route.
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/agents)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/traces)" = "200"

          # Root path now redirects to /agents (changed from /traces in
          # this PR — agent-first dashboard makes /agents the home).
          curl -sI http://127.0.0.1:3000/ | grep -i '^location:' | grep -q '/agents'
      - name: Container logs on failure
        if: failure()
        run: docker logs korveo-ci 2>&1 | tail -100 || true
      - name: Cleanup container
        if: always()
        run: docker rm -f korveo-ci || true

  e2e:
    name: E2E browser tests (Playwright)
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/dashboard/package-lock.json
      - name: Install dashboard deps
        working-directory: packages/dashboard
        run: npm install --no-audit --no-fund
      - name: Install Playwright browsers
        working-directory: packages/dashboard
        run: npx playwright install --with-deps chromium
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build container (cache hit from docker job)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: korveo/korveo:e2e
          cache-from: type=gha
      - name: Start container
        run: |
          # Safe-by-default 403s the runner→container Docker-NAT IP
          # without this; CI is trusted + ephemeral (prod uses a token).
          docker run -d --name korveo-e2e -e KORVEO_ALLOW_INSECURE=1 -p 3000:3000 -p 8000:8000 korveo/korveo:e2e
          for i in $(seq 1 30); do
            sleep 1
            curl -sf http://127.0.0.1:8000/health >/dev/null 2>&1 && break
          done
      - name: Run Playwright tests
        working-directory: packages/dashboard
        run: npm run test:e2e
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            packages/dashboard/playwright-report/
            packages/dashboard/test-results/
          retention-days: 7
      - name: Cleanup
        if: always()
        run: docker rm -f korveo-e2e || true
