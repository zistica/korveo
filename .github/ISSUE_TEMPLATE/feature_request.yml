name: Feature request
description: Suggest an idea or improvement for Korveo.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature.
        Korveo v1 has a tight scope (see docs/Development_Rules.md).
        We may defer good ideas to a later phase — that's not a rejection.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and discussions for this idea.
          required: true
        - label: I have read docs/Korveo_Knowledge.md to understand the product roadmap.
          required: false

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user pain point. Avoid jumping to a solution.
      placeholder: When I run an agent for hours, the dashboard becomes slow because...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Be specific.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      multiple: true
      options:
        - Python SDK
        - TypeScript SDK
        - FastAPI backend
        - Next.js dashboard
        - Docker image
        - Documentation
        - LangChain integration
        - CrewAI integration
        - AutoGen integration
        - APPI / enterprise (not v1)
        - Other / not sure
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Which phase does this fit?
      description: See docs/Korveo_Knowledge.md Section 14 (Product Roadmap).
      options:
        - Phase 1 — Local OSS (Months 1-6)
        - Phase 2 — Cloud tier (Months 6-12)
        - Phase 3 — Japan enterprise (Months 12-24)
        - Not sure

  - type: textarea
    id: usecase
    attributes:
      label: Concrete use case
      description: A real scenario where this would be useful. Code examples welcome.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, screenshots, references to similar features in other tools.
