[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "korveo"
version = "1.0.3"
description = "Local-first AI agent observability SDK"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Zistica Inc." }]
dependencies = [
    "httpx>=0.24.0",
    # Added for the Policy Engine (Accountability Layer Part B):
    #   - simpleeval: safe expression evaluation for policy conditions.
    #     Required because we MUST NOT use Python eval() — see comment
    #     in korveo/policy.py for the full security rationale.
    #   - pyyaml: parse the user's korveo-policies.yaml. There's no
    #     YAML support in the stdlib.
    # Both are pure-Python, no transitive deps. Deviation from the
    # "minimal deps" rule is intentional and documented in the Policy
    # Engine session.
    "simpleeval>=0.9.13",
    "pyyaml>=6.0",
]

[project.scripts]
# `pip install korveo` puts a `korveo` command on PATH:
#   korveo up      start the container + open the dashboard
#   korveo demo    fire a real attack at the live firewall
#   korveo doctor  connectivity + detector check
korveo = "korveo.cli:main"

[project.optional-dependencies]
test = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]
langchain = [
    "langchain-core>=0.3.0",
]
langgraph = [
    "langgraph>=0.2.0",
]
crewai = [
    "crewai>=0.80.0",
]
anthropic = [
    "anthropic>=0.30.0",
]
llama_index = [
    "llama-index-core>=0.10.0",
]
litellm = [
    "litellm>=1.40.0",
]
openai_agents = [
    "openai-agents>=0.0.1",
]
autogen = [
    "pyautogen>=0.4.0",
]
pydantic_ai = [
    "pydantic-ai>=0.0.13",
]
all = [
    "langchain-core>=0.3.0",
    "langgraph>=0.2.0",
    "crewai>=0.80.0",
    "anthropic>=0.30.0",
    "llama-index-core>=0.10.0",
    "litellm>=1.40.0",
    "openai-agents>=0.0.1",
    "pyautogen>=0.4.0",
    "pydantic-ai>=0.0.13",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["korveo*"]
exclude = ["tests*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
